<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nothing here — gabriel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --fg: #d4d4d4;
      --dim: #555;
      --dimmer: #2a2a2a;
      --accent: #f0f0f0;
      --line: #1e1e1e;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 0 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 4rem 0 6rem;
    }

    /* ── top nav ── */
    .post-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    .nav-link {
      font-size: 0.7rem;
      color: var(--dim);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }

    .nav-link:hover { color: var(--fg); }
    .nav-link.home::before { content: '← '; }
    .nav-link.next::after  { content: ' →'; }
    .nav-link.disabled { opacity: 0.2; pointer-events: none; }

    /* ── post header ── */
    .post-header {
      margin-bottom: 2.75rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.08s forwards;
    }

    .post-title {
      font-family: 'EB Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      color: var(--accent);
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }

    .post-meta {
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.06em;
    }

    /* ── divider ── */
    .divider {
      height: 1px;
      background: var(--line);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.12s forwards;
    }

    /* ── body copy ── */
    .post-body {
      opacity: 0;
      animation: fadeUp 0.5s ease 0.18s forwards;
    }

    .post-body p {
      font-family: 'EB Garamond', serif;
      font-size: 1.15rem;
      line-height: 1.8;
      color: #bbb;
      margin-bottom: 1.4rem;
      font-weight: 400;
    }

    .post-body h2 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin: 2.5rem 0 1rem;
    }

    .post-body a {
      color: var(--fg);
      text-decoration: underline;
      text-decoration-color: var(--dimmer);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s;
    }

    .post-body a:hover { text-decoration-color: var(--fg); }

    .post-body code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      background: var(--dimmer);
      color: #ccc;
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }

    /* ── bottom nav ── */
    .bottom-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--line);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.25s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .post-title { font-size: 1.6rem; }
      main { padding: 3rem 0 5rem; }
    }
  </style>
</head>
<body>
  <main>

    <nav class="post-nav">
      <a class="nav-link home" href="../index.html">gabriel</a>
      <a class="nav-link next" href="neovim.html">next post</a>
    </nav>

    <header class="post-header">
      <h1 class="post-title">nothing here</h1>
      <div class="post-meta">march 2026</div>
    </header>

    <div class="divider"></div>

    <article class="post-body">
      <p>
        what did you expect, theres nothing here
        </p>
      <p>- Gabriel</p>
    </article>

    <nav class="bottom-nav">
      <span></span>
      <a class="nav-link next" href="neovim.html">next post</a>
    </nav>

  </main>
</body>
</html>
