<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gabriel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0c;
      --fg: #ddd5c8;
      --dim: #6b5f52;
      --dimmer: #2a2520;
      --accent: #f0e6d6;
      --line: #211e1a;
      --amber: #e8943a;
      --amber-dim: #7a4a1a;
      --amber-muted: #3a2410;
      --sage: #7a9e7e;
      --rose: #c47a6a;
      --sky: #6a8eae;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 0 1.5rem;
      cursor: default;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 5rem 0 6rem;
    }

    .fade { opacity: 0; animation: fadeUp 0.5s ease forwards; }
    .fade-1 { animation-delay: 0.00s; }
    .fade-2 { animation-delay: 0.08s; }
    .fade-3 { animation-delay: 0.16s; }
    .fade-4 { animation-delay: 0.24s; }
    .fade-5 { animation-delay: 0.32s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── name ── */
    .name {
      font-family: 'EB Garamond', serif;
      font-size: 2.6rem;
      font-weight: 400;
      color: var(--amber);
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 0.9rem;
    }

    .tagline { font-size: 0.78rem; color: var(--dim); font-weight: 300; letter-spacing: 0.04em; }
    .tagline em { font-family: 'EB Garamond', serif; font-style: italic; color: #9a8070; font-size: 0.9rem; }

    /* ── section label ── */
    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

    .label-about  { color: var(--sage); }
    .label-projects { color: var(--sky); }
    .label-writing  { color: var(--amber); }

    .label-about::after  { background: color-mix(in srgb, var(--sage) 20%, var(--line)); }
    .label-projects::after { background: color-mix(in srgb, var(--sky) 20%, var(--line)); }
    .label-writing::after  { background: color-mix(in srgb, var(--amber) 20%, var(--line)); }

    /* ── about ── */
    .about-text { font-size: 0.88rem; line-height: 1.75; color: #b8a898; font-weight: 300; }
    .about-text + .about-text { margin-top: 0.75rem; }

    /* ── project list ── */
    .project-list { list-style: none; }
    .project-list li { border-bottom: 1px solid var(--line); }
    .project-list li:first-child { border-top: 1px solid var(--line); }
    .project-list a {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0.75rem 0; text-decoration: none; color: inherit; gap: 1rem;
    }
    .project-list a:hover .proj-name { color: var(--sky); }
    .project-list a:hover .proj-arrow { opacity: 1; transform: translateX(2px); color: var(--sky); }
    .proj-left { display: flex; flex-direction: column; gap: 0.2rem; min-width: 0; }
    .proj-name { font-size: 0.88rem; color: var(--fg); transition: color 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proj-desc { font-size: 0.72rem; color: var(--dim); font-weight: 300; }
    .proj-arrow { font-size: 0.75rem; color: var(--dim); opacity: 0; transition: opacity 0.15s, transform 0.15s, color 0.15s; flex-shrink: 0; }

    /* ── post list ── */
    .post-list { list-style: none; }
    .post-list li { border-bottom: 1px solid var(--line); }
    .post-list li:first-child { border-top: 1px solid var(--line); }
    .post-list a {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0.75rem 0; text-decoration: none; color: inherit; gap: 1rem; cursor: pointer;
    }
    .post-list a:hover .post-title { color: var(--amber); }
    .post-title { font-size: 0.88rem; color: var(--fg); transition: color 0.15s; font-weight: 300; }
    .post-date { font-size: 0.7rem; color: var(--dim); flex-shrink: 0; font-style: italic; font-family: 'EB Garamond', serif; }

    /* ── footer ── */
    footer { margin-top: 5rem; font-size: 0.68rem; color: var(--dimmer); display: flex; gap: 1.5rem; }
    footer a { color: var(--dim); text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: var(--amber); }

    /* ── cursor ── */
    .cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--amber); vertical-align: text-bottom; margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── post nav ── */
    .post-nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 3.5rem;
    }
    .nav-link {
      font-size: 0.7rem; color: var(--dim); text-decoration: none;
      letter-spacing: 0.04em; transition: color 0.15s; cursor: pointer; background: none; border: none;
    }
    .nav-link:hover { color: var(--amber); }
    .nav-link.home::before { content: '← '; }
    .nav-link.prev::before { content: '← '; }
    .nav-link.next::after  { content: ' →'; }
    .nav-link.disabled { opacity: 0.2; pointer-events: none; }

    /* ── post body ── */
    .post-heading {
      font-family: 'EB Garamond', serif;
      font-size: 2rem; font-weight: 400; color: var(--accent);
      line-height: 1.2; margin-bottom: 0.75rem;
    }
    .post-meta { font-size: 0.68rem; color: var(--amber-dim); letter-spacing: 0.06em; margin-bottom: 2.75rem; }
    .divider { height: 1px; background: var(--line); margin-bottom: 2.5rem; }

    .post-body p {
      font-family: 'EB Garamond', serif;
      font-size: 1.15rem; line-height: 1.8; color: #c0b0a0; margin-bottom: 1.4rem;
    }
    .post-body h2 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--amber); margin: 2.5rem 0 1rem;
    }
    .post-body a { color: var(--sky); text-decoration: underline; text-decoration-color: color-mix(in srgb, var(--sky) 30%, transparent); text-underline-offset: 3px; transition: text-decoration-color 0.2s; }
    .post-body a:hover { text-decoration-color: var(--sky); }
    .post-body strong { color: var(--fg); font-weight: 500; }
    .post-body em { color: var(--rose); font-style: italic; }
    .post-body code { font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; background: var(--amber-muted); color: var(--amber); padding: 0.15em 0.4em; border-radius: 3px; }
    .post-body pre { background: #141210; border: 1px solid var(--line); border-radius: 4px; padding: 1rem 1.1rem; margin: 1.25rem 0; overflow-x: auto; }
    .post-body pre code { background: none; padding: 0; font-size: 0.8rem; color: #b0a090; line-height: 1.65; }

    .callout {
      border-left: 2px solid var(--amber-dim);
      padding: 0.6rem 1rem; margin: 1.5rem 0;
      background: var(--amber-muted);
    }
    .callout p { font-size: 0.82rem !important; color: #b08060 !important; margin: 0 !important; font-family: 'IBM Plex Mono', monospace !important; }

    .bottom-nav {
      display: flex; justify-content: space-between;
      margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid var(--line);
    }

    .home-section { margin-bottom: 3rem; }
    .home-header { margin-bottom: 4rem; }

    @media (max-width: 480px) {
      .name { font-size: 2rem; }
      .post-heading { font-size: 1.6rem; }
      main { padding: 3.5rem 0 5rem; }
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    const posts = [
      {
        slug: 'the-first-blog',
        title: 'The first blog',
        date: 'march 2026',
        body: `
          <p>You should have already read the "about me" section on the homepage. If not: hi, I'm Gabriel. This is my blog. And
          I'm a middle schooler who spends too much time on a computer. I play Minecraft, do random stuff, and occasionally do things that make my computer explode.</p>
          <h2>Passion</h2>
          <p>Now, why am I doing this website as a project for genius hour? I could have done literally anything else. I could have built a robot,
          made a game, learned to do something new. But I wanted to make a website.
          I'm not entirely sure what this'll be. Probably a mix of things I'm
          working on, stuff I figured out after way too long, and the occasional project that actually works without breaking everything.</p>
          <p>I keep running into problems where the answer exists somewhere on the
          internet, but it's buried in a three-year-old Reddit thread or a forum
          post where the accepted answer is "nvm fixed it." Writing things dow
          here means at minimum <em>I</em> can find them later.</p>
          <h2>Materials</h2>
          <p>A computer and some common sense. And also a lot of trial and error, and probably a lot of help from the internet. That's it, I guess I may be a tad bit too lazy.</p>
          <p>This month I'll probably just be making this site better, add some random projects, and probably struggle to make a blog post that isn't just "I did a thing, it was cool, here's a screenshot." But we'll see how it goes. And a struggle to make a Minecraft mod too, oh well.</p>
          <p>Anyway. Post one done. Thanks for reading.</p>
          <p>- Gabriel</p>
        `
      },
    {
      slug: 'the-second-blog',
      title: 'The second blog',
      date: 'april 2026'
      body:
        <p>Alrighty, 1 month update time.</p> 
    }
    ];

    function navigate(slug) {
      if (slug) { window.location.hash = slug; }
      else { window.location.hash = ''; }
      render();
      window.scrollTo(0, 0);
    }

    function render() {
      const hash = window.location.hash.replace('#', '');
      const app = document.getElementById('app');
      if (!hash) { renderHome(app); }
      else {
        const idx = posts.findIndex(p => p.slug === hash);
        if (idx !== -1) renderPost(app, idx);
        else renderHome(app);
      }
    }

    function renderHome(app) {
      document.title = 'gabriel';
      app.innerHTML = `
        <header class="home-header fade fade-1">
          <h1 class="name">gabriel<span class="cursor"></span></h1>
          <p class="tagline">student · builder · <em>tinkerer of things</em></p>
        </header>

        <div class="home-section fade fade-2">
          <div class="section-label label-about">about</div>
          <p class="about-text">Middle schooler who spends too much time on a computer.
          I play Minecraft, do random stuff, and occasionally do things
          that make my computer explode.</p>
          <p class="about-text">Currently: Making a Minecraft mod, relearning html and struggling to do something for genius hour. :/</p>
        </div>

        <div class="home-section fade fade-3">
          <div class="section-label label-projects">projects</div>
          <ul class="project-list">
            <li>
              <a href="https://github.com/egt-cs50/Genius-Hour-sy2026-303" target="_blank" rel="noopener">
                <span class="proj-left">
                  <span class="proj-name">This site</span>
                  <span class="proj-desc">You're looking at it.</span>
                </span>
                <span class="proj-arrow">↗</span>
              </a>
            </li>
            <li>
              <a href="https://github.com/egt-cs50/Web-Crawler" target="_blank" rel="noopener">
                <span class="proj-left">
                  <span class="proj-name">Web Crawler</span>
                  <span class="proj-desc">A simple web crawler built with Python.</span>
                </span>
                <span class="proj-arrow">↗</span>
              </a>
            </li>
            <li>
              <a href="https://github.com/egt-cs50/tauri-wrap" target="_blank" rel="noopener">
                <span class="proj-left">
                  <span class="proj-name">Tauri-Wrap</span>
                  <span class="proj-desc">A simple tool coded in rust that creates an application from a website (i.e. google.com)</span>
                </span>
                <span class="proj-arrow">↗</span>
              </a>
            </li>
          </ul>
        </div>

        <div class="home-section fade fade-4">
          <div class="section-label label-writing">writing</div>
          <ul class="post-list">
            ${posts.map(p => `
              <li>
                <a onclick="navigate('${p.slug}')">
                  <span class="post-title">${p.title}</span>
                  <span class="post-date">${p.date}</span>
                </a>
              </li>
            `).join('')}
          </ul>
        </div>

        <footer class="fade fade-5">
          <a href="https://github.com/egt-cs50" target="_blank">github</a>
          <a href="mailto:hello@example.com">email</a>
          <span>made with too much free time</span>
        </footer>
      `;
    }

    function renderPost(app, idx) {
      const post = posts[idx];
      const prev = posts[idx + 1] || null;
      const next = posts[idx - 1] || null;
      document.title = `${post.title} — gabriel`;
      app.innerHTML = `
        <nav class="post-nav fade fade-1">
          <button class="nav-link home" onclick="navigate('')">gabriel</button>
          ${next
            ? `<button class="nav-link next" onclick="navigate('${next.slug}')">next post</button>`
            : `<span class="nav-link disabled">next post →</span>`}
        </nav>

        <div class="fade fade-2">
          <h1 class="post-heading">${post.title}</h1>
          <div class="post-meta">${post.date}</div>
        </div>

        <div class="divider fade fade-2"></div>

        <article class="post-body fade fade-3">
          ${post.body}
        </article>

        <nav class="bottom-nav fade fade-4">
          ${prev ? `<button class="nav-link prev" onclick="navigate('${prev.slug}')">prev post</button>` : `<span></span>`}
          ${next ? `<button class="nav-link next" onclick="navigate('${next.slug}')">next post</button>` : `<span></span>`}
        </nav>
      `;
    }

    window.addEventListener('hashchange', render);
    render();
  </script>
</body>
</html>
